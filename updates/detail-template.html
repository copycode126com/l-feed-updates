<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | L-feed Updates</title>
    <meta name="description" content="{{SUMMARY}}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{CANONICAL_URL}}">

    <meta property="og:title" content="{{TITLE}} | L-feed Updates">
    <meta property="og:description" content="{{SUMMARY}}">
    <meta property="og:url" content="{{CANONICAL_URL}}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="L-feed">
    <meta property="og:image" content="https://www.lexifeed.top/assets/images/lexifeed.webp">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}} | L-feed Updates">
    <meta name="twitter:description" content="{{SUMMARY}}">
    <meta name="twitter:image" content="https://www.lexifeed.top/assets/images/lexifeed.webp">

    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../updates.css">
</head>
<body class="updates-page detail">
    <div class="updates-gradient"></div>
    <div class="updates-noise"></div>

    <header class="updates-hero">
        <div class="hero-content">
            <p class="hero-eyebrow">Product Update · {{DATE_TEXT}}</p>
            <h1>{{TITLE}}</h1>
            <p class="hero-summary">{{SUMMARY}}</p>
            <div class="hero-meta" aria-label="Update meta">
                <time datetime="{{DATE}}">{{DATE_TEXT}}</time>
                <span class="dot" aria-hidden="true"></span>
                <span>{{READING_TIME}}</span>
            </div>
            <div class="hero-actions">
                <a class="ghost-link" href="/updates">← Back to all updates</a>
            </div>
        </div>
    </header>

    <main class="update-article" id="update-article">
        <section class="update-body" id="update-content">
{{CONTENT_HTML}}
        </section>

        <hr class="divider">

        <section class="share-card">
            <div>
                <p class="share-label">Spread the word</p>
                <p class="share-desc">Share this update with your community.</p>
            </div>
            <div class="share-actions">
                <button type="button" class="share-btn" data-share="copy">
                    <span>Copy link</span>
                </button>
                <button type="button" class="share-btn" data-share="x">
                    <span>Share to X</span>
                </button>
            </div>
        </section>
    </main>

    <script>
        window.__UPDATE_ENTRY__ = {{ENTRY_JSON}};
    </script>
    <script type="module" src="../detail.js"></script>
</body>
</html>
